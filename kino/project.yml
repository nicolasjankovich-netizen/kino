# XcodeGen → Kino.xcodeproj (Freundin-App). Regenerate: xcodegen generate
name: Kino
options:
  bundleIdPrefix: com.nicolas
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.7"
    CURRENT_PROJECT_VERSION: "7"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: K3FPMLBKSS
targets:
  Kino:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Shared
      - path: Assets.xcassets
    dependencies:
      - target: KinoWidgets
        embed: true
    info:
      path: Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UIStatusBarStyle: UIStatusBarStyleLightContent
        NSSupportsLiveActivities: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # HLS/LAN-Streaming über http (Jellyfin) erlauben — sonst blockt ATS den Player.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nicolas.Kino
        PRODUCT_NAME: Kino
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: YES
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: NO
        MACOSX_DEPLOYMENT_TARGET: "26.0"

  KinoWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets
      - path: Shared
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: Kino
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nicolas.Kino.Widgets
        PRODUCT_NAME: KinoWidgets
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: YES
